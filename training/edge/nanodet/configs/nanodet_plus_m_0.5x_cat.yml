# NanoDet-Plus-m 0.5x cat-only @ 224x224 (US-008)
#
# Derived from upstream `config/nanodet-plus-m_416.yml`. Differences vs upstream:
#   * model.arch.backbone.model_size: 1.0x -> 0.5x  (ShuffleNetV2 channel scale)
#   * model.arch.fpn.in_channels:    [116, 232, 464] -> [48, 96, 192]
#                                     (matches the 0.5x ShuffleNetV2 stage outputs;
#                                      see upstream `config/legacy_v0.x_configs/nanodet-m-0.5x.yml`)
#   * model.arch.head.num_classes:    80 -> 1
#   * model.arch.aux_head.num_classes: 80 -> 1
#   * data.train/val.input_size:      [416,416] -> [224,224]
#   * data paths -> training/edge/data/labeled/* (COCO instances_*.json from
#                                                  training.edge.nanodet.yolo_to_coco)
#   * schedule.optimizer.lr:          0.001 -> 0.0001  (fine-tune from pretrained)
#   * schedule.total_epochs:          300   -> 50
#   * schedule.warmup.steps:          500   -> 50      (small dataset)
#   * schedule.lr_schedule.T_max:     300   -> 50
#   * device.batchsize_per_gpu:       96    -> 32
#   * class_names:                    80 COCO -> ['cat']
#
# Generated by `training/edge/nanodet/train_nanodet_cat.py prepare-config`. Edits
# made by hand to the file shape are preserved across runs unless --regenerate
# is passed.

save_dir: training/edge/nanodet/runs/nanodet_cat_0.5x_224
model:
  weight_averager:
    name: ExpMovingAverager
    decay: 0.9998
  arch:
    name: NanoDetPlus
    detach_epoch: 10
    backbone:
      name: ShuffleNetV2
      model_size: 0.5x
      out_stages: [2, 3, 4]
      activation: LeakyReLU
    fpn:
      name: GhostPAN
      in_channels: [48, 96, 192]
      out_channels: 96
      kernel_size: 5
      num_extra_level: 1
      use_depthwise: True
      activation: LeakyReLU
    head:
      name: NanoDetPlusHead
      num_classes: 1
      input_channel: 96
      feat_channels: 96
      stacked_convs: 2
      kernel_size: 5
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7
      norm_cfg:
        type: BN
      loss:
        loss_qfl:
          name: QualityFocalLoss
          use_sigmoid: True
          beta: 2.0
          loss_weight: 1.0
        loss_dfl:
          name: DistributionFocalLoss
          loss_weight: 0.25
        loss_bbox:
          name: GIoULoss
          loss_weight: 2.0
    aux_head:
      name: SimpleConvHead
      num_classes: 1
      input_channel: 192
      feat_channels: 192
      stacked_convs: 4
      strides: [8, 16, 32, 64]
      activation: LeakyReLU
      reg_max: 7
data:
  train:
    name: CocoDataset
    img_path: training/edge/data/labeled
    ann_path: training/edge/data/labeled/coco/instances_train.json
    input_size: [224, 224]
    keep_ratio: False
    pipeline:
      perspective: 0.0
      scale: [0.6, 1.4]
      stretch: [[0.8, 1.2], [0.8, 1.2]]
      rotation: 0
      shear: 0
      translate: 0.2
      flip: 0.5
      brightness: 0.2
      contrast: [0.6, 1.4]
      saturation: [0.5, 1.2]
      normalize: [[103.53, 116.28, 123.675], [57.375, 57.12, 58.395]]
  val:
    name: CocoDataset
    img_path: training/edge/data/labeled
    ann_path: training/edge/data/labeled/coco/instances_val.json
    input_size: [224, 224]
    keep_ratio: False
    pipeline:
      normalize: [[103.53, 116.28, 123.675], [57.375, 57.12, 58.395]]
device:
  gpu_ids: [0]
  workers_per_gpu: 4
  batchsize_per_gpu: 32
  precision: 32
schedule:
  optimizer:
    name: AdamW
    lr: 0.0001
    weight_decay: 0.05
  warmup:
    name: linear
    steps: 50
    ratio: 0.0001
  total_epochs: 50
  lr_schedule:
    name: CosineAnnealingLR
    T_max: 50
    eta_min: 0.000005
  val_intervals: 5
grad_clip: 35
evaluator:
  name: CocoDetectionEvaluator
  save_key: mAP
log:
  interval: 10

class_names: ['cat']
